<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#7a1931" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <title>PAPE AO - Mujeres Gasto Escencial</title>
  <style>
    body { font-family: Arial, sans-serif; background:#f7f2f4; margin:0; }
    .wrap { max-width:760px; margin:24px auto; background:#fff; border-radius:12px; padding:20px; box-shadow:0 2px 12px rgba(0,0,0,.08); }
    h1 { margin:0 0 6px; }
    .muted { color:#666; font-size:14px; }
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:14px; }
    .full { grid-column:1 / -1; }
    label { font-size:13px; font-weight:bold; color:#333; display:block; margin-bottom:4px; }
    input { width:100%; box-sizing:border-box; padding:10px; border:1px solid #cfd6dd; border-radius:8px; }
    .row { display:flex; gap:10px; flex-wrap:wrap; margin-top:14px; }
    button { border:0; color:#fff; border-radius:8px; padding:10px 14px; cursor:pointer; font-weight:bold; }
    .btn-blue { background:#7a1931; }
    .btn-green { background:#9f2241; }
    .btn-purple { background:#5c1226; }
    .btn-gray { background:#4b5563; }
    .btn-github { background:#111827; }
    table { width:100%; border-collapse:collapse; margin-top:14px; }
    th, td { border:1px solid #e5e7eb; padding:8px; font-size:13px; text-align:left; }
    th { background:#fff1f2; }
    .pill { display:inline-block; background:#fdf2f8; color:#881337; border-radius:999px; padding:4px 10px; font-size:12px; font-weight:bold; }
    .ok { color:#065f46; font-weight:bold; }
    .warn { color:#92400e; font-weight:bold; }
    .header { display:flex; align-items:center; gap:12px; border-bottom:0; padding:12px; background:#7a1931; border-radius:10px; }
    .header img { width:58px; height:58px; object-fit:contain; }
    .title-main { color:#fff; margin:0; font-size:23px; }
    .section { margin-top:18px; padding:12px; border:1px solid #ead2d8; border-radius:10px; background:#fffafa; }
    .section h3 { margin:0 0 8px; color:#7a1931; }
    .admin-summary { cursor:pointer; font-weight:bold; color:#7a1931; }
    .locked { color:#7f1d1d; font-weight:bold; }
    .scanner-box { margin-top:10px; padding:10px; border:1px dashed #c9a4ae; border-radius:8px; background:#fff; }
    .scanner-video { width:100%; max-width:360px; border-radius:8px; background:#000; }
    .photo-guide { border:2px dashed #c9a4ae; border-radius:10px; padding:10px; background:#fff; }
    .photo-preview { width:100%; min-height:120px; max-height:220px; object-fit:contain; border:1px solid #e5e7eb; border-radius:8px; background:#f9fafb; }
    .photo-hint { font-size:12px; color:#6b7280; }
    .file-hidden { position:absolute; left:-9999px; width:1px; height:1px; opacity:0; pointer-events:none; }
    .file-trigger { display:inline-flex; align-items:center; justify-content:center; border:0; color:#fff; border-radius:8px; padding:10px 14px; cursor:pointer; font-weight:bold; line-height:1; user-select:none; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <img src="../logo/logo.png" alt="Logo institucional" onerror="this.style.display='none'" />
      <div>
        <h1 class="title-main">PAPE AO - Mujeres Gasto Escencial</h1>
      </div>
    </div>

    <div class="section" style="margin-top:12px">
      <h3>Acceso</h3>
      <div class="grid" style="margin-top:10px">
        <div>
          <label>Nombre de usuario</label>
          <input id="auth_nombre" list="usuariosList" placeholder="Escribe tu nombre" oninput="autocompletarNombreUsuario()" />
          <datalist id="usuariosList"></datalist>
        </div>
        <div>
          <label>Clave de acceso</label>
          <input id="auth_clave" type="password" placeholder="Ingresa tu clave" />
        </div>
      </div>
      <div class="row" style="margin-top:10px">
        <button class="btn-blue" onclick="validarAcceso()">Validar identidad</button>
      </div>
      <div id="authEstado" class="locked" style="margin-top:6px">Sin validar identidad</div>
    </div>

    <div style="margin-top:10px" class="pill" id="pendingCounter">Pendientes por enviar: 0</div>

    <div class="grid">
      <div class="full">
        <label>Clave Vivienda</label>
        <input id="clave_vivienda" placeholder="Ej: VIV-0001" />
      </div>

      <div class="full row" style="margin-top:0">
        <button class="btn-blue" onclick="buscarClave()">Buscar clave vivienda</button>
      </div>

      <div><label>Nombre</label><input id="nombre" /></div>
      <div><label>Edad</label><input id="edad" type="number" /></div>
      <div><label>Teléfono</label><input id="telefono" /></div>
      <div><label>Correo electrónico</label><input id="correo_electronico" type="email" /></div>
      <div><label>Calle</label><input id="calle" /></div>
      <div><label>Número</label><input id="numero" /></div>
      <div><label>Manzana INEGI (base)</label><input id="manzana_inegi" readonly /></div>
      <div><label>Manzana (dirección/campo)</label><input id="manzana" /></div>
      <div><label>Lote</label><input id="lote" /></div>
      <div><label>CURP</label><input id="curp" /></div>
      <div><label>Colonia</label><input id="colonia" /></div>
      <div><label>Código Postal</label><input id="codigo_postal" /></div>
      <div class="full"><label>Dirección base</label><input id="direccion_base" readonly /></div>
      <div class="full row" style="margin-top:0">
        <button id="btnCapturarGPS" class="btn-gray" onclick="capturarCoordenadasGPS()">Capturar coordenadas GPS</button>
      </div>
      <div class="full"><label>Coordenadas GPS</label><input id="coordenadas_gps" readonly placeholder="Ej: 19.432608,-99.133209" /></div>
      <div class="full photo-guide">
        <label>Fotos de Documentos</label>
        <div class="row" style="margin-top:0">
          <label for="foto1_input" class="btn-gray file-trigger">Frontal</label>
          <label for="foto2_input" class="btn-gray file-trigger">Reverso</label>
          <label for="foto3_input" class="btn-gray file-trigger">Comprobante de Domicilio</label>
        </div>
        <div class="grid" style="margin-top:10px">
          <div>
            <label>Vista previa Frontal</label>
            <img id="foto1_preview" class="photo-preview" alt="Vista previa foto 1" />
            <div id="foto1_meta" class="photo-hint" style="margin-top:4px">Sin captura</div>
          </div>
          <div>
            <label>Vista previa Reverso</label>
            <img id="foto2_preview" class="photo-preview" alt="Vista previa foto 2" />
            <div id="foto2_meta" class="photo-hint" style="margin-top:4px">Sin captura</div>
          </div>
          <div>
            <label>Vista previa Comprobante</label>
            <img id="foto3_preview" class="photo-preview" alt="Vista previa foto 3" />
            <div id="foto3_meta" class="photo-hint" style="margin-top:4px">Sin captura</div>
          </div>
        </div>
        <input id="foto1_input" class="file-hidden" type="file" accept="image/*" capture="environment" onchange="procesarFotoCredencial(1, event)" />
        <input id="foto2_input" class="file-hidden" type="file" accept="image/*" capture="environment" onchange="procesarFotoCredencial(2, event)" />
        <input id="foto3_input" class="file-hidden" type="file" accept="image/*" capture="environment" onchange="procesarFotoCredencial(3, event)" />
      </div>
    </div>

    <div class="row">
      <button class="btn-green" onclick="guardarOffline()">Guardar offline</button>
      <button class="btn-purple" onclick="sincronizarManual()">Sincronizar ahora</button>
      <button class="btn-gray" onclick="descargarCSV()">Descargar CSV</button>
    </div>

    <details class="section">
      <summary class="admin-summary">Configuración técnica (solo administrador)</summary>
      <div class="muted">Sin servicios externos: sincroniza directo a GitHub.</div>
      <div class="grid" style="margin-top:10px">
        <div><label>Owner</label><input id="ghOwner" value="GeomaticaAO" readonly /></div>
        <div><label>Repositorio</label><input id="ghRepo" value="APP_PAPEAO_MGE" readonly /></div>
        <div><label>Branch</label><input id="ghBranch" value="main" readonly /></div>
        <div><label>Carpeta destino</label><input id="ghFolder" value="Bases de datos" readonly /></div>
        <div class="full" id="tokenInputRow"><label>Token GitHub</label><input id="gh_token_input" type="password" placeholder="github_pat_..." /></div>
      </div>
      <div class="row" style="margin-top:10px" id="tokenButtonsRow">
        <button class="btn-github" onclick="guardarTokenManual()">Guardar token</button>
      </div>
      <div id="tokenEstado" class="muted" style="margin-top:6px">Token no configurado</div>
    </details>

    <div id="estado" class="muted" style="margin-top:10px"></div>

    <h3 style="margin:18px 0 8px">Registros pendientes</h3>
    <table>
      <thead>
        <tr>
          <th>Clave</th><th>Nombre</th><th>Edad</th><th>Manzana</th><th>Fecha</th>
        </tr>

  <script src="./libs/xlsx.full.min.js" onerror="this.onerror=null;this.src='./web-demo/libs/xlsx.full.min.js';"></script>
  <script>
    const KEY_PENDING = 'papeao_censo_pending';
    const KEY_REEMPLAZADOS_ALL = 'papeao_reemplazados_all';
    const KEY_REEMPLAZADOS_PENDING = 'papeao_reemplazados_pending';
    const KEY_BASE_CACHE = 'papeao_base_cache_v1';
    const KEY_USERS_CACHE = 'papeao_users_cache_v2';
    const KEY_GH_TOKEN = 'papeao_gh_write_token';
    const KEY_SYNC_PROXY_URL = 'papeao_sync_proxy_url';
    const KEY_DEVICE_ID = 'papeao_device_id';
    const KEY_ENVIADOS = 'papeao_censo_enviados';
    const KEY_SW_MIGRATION = 'papeao_sw_migrated_v3';
    const KEY_STORAGE_MIGRATION = 'papeao_storage_migrated_v1';
    const GITHUB_WRITE_TOKEN = '';
    const BASE_OWNER = 'GeomaticaAO';
    const BASE_REPO = 'APP_PAPEAO_MGE';
    const BASE_BRANCH = 'main';
    const PHOTO_MAX_WIDTH = 960;
    const PHOTO_MAX_HEIGHT = 720;
    const PHOTO_JPEG_QUALITY = 0.4;
    const PHOTO_SLOTS = [1, 2, 3];
    const PHOTO_DB_NAME = 'papeao_censo_photos_v1';
    const PHOTO_DB_STORE = 'photos';
    const BRANCH_CANDIDATES = ['main', 'master'];
    const BASE_FILE_CANDIDATES = [
      'TOTAL_JEFAS_FAMILIA.xlsx',
      'TOTAL_JEFAS FAMILIA.xlsx',
      'base/TOTAL_JEFAS_FAMILIA.xlsx',
      'base/TOTAL_JEFAS FAMILIA.xlsx',
      'TOTAL_JEFAS_FAMILIA.json',
      'TOTAL_JEFAS FAMILIA.json',
      'base/TOTAL_JEFAS_FAMILIA.json',
      'base/TOTAL_JEFAS FAMILIA.json',
      'TOTAL_JEFAS_FAMILIA.csv',
      'TOTAL_JEFAS FAMILIA.csv',
      'base/TOTAL_JEFAS_FAMILIA.csv',
      'base/TOTAL_JEFAS FAMILIA.csv'
    ];
    const USERS_FILE_CANDIDATES = [
      'USUARIOS.xlsx',
      'base/USUARIOS.xlsx',
      'USUARIOS.json',
      'USUARIOS.csv',
      'USUARIOS_CAPTURA.json',
      'USUARIOS_CAPTURA.csv',
      'CATALOGO_USUARIOS.json',
      'CATALOGO_USUARIOS.csv',
      'base/USUARIOS_CAPTURA.json',
      'base/USUARIOS_CAPTURA.csv'
    ];
    const BASE_STATIC_FILE_CANDIDATES = [
      '../TOTAL_JEFAS FAMILIA.xlsx',
      '../TOTAL_JEFAS_FAMILIA.xlsx',
      '../base/TOTAL_JEFAS FAMILIA.xlsx',
      '../base/TOTAL_JEFAS_FAMILIA.xlsx'
    ];
    const USERS_STATIC_FILE_CANDIDATES = [
      '../USUARIOS.xlsx',
      '../base/USUARIOS.xlsx'
    ];

    let baseCenso = {
      'VIV-0001': { nombre:'MARIA GARCIA', edad:42, telefono:'5551234567', calle:'AV CENTRAL', numero:'120', manzana:'MZ-2', lote:'LT-8', curp:'GARM820101MDFXXX01' },
      'VIV-0002': { nombre:'JUAN PEREZ', edad:35, telefono:'5559876543', calle:'CALLE NORTE', numero:'52', manzana:'MZ-5', lote:'LT-11', curp:'PEJJ900505HDFXXX09' }
    };
    let usersCatalog = [];
    let repoFilesCache = null;
    let repoBranchInUse = BASE_BRANCH;
    let sessionUser = null;
    let fotosCredencial = { 1: null, 2: null, 3: null };
    let photosDbPromise = null;

    function migrateLegacyStorageIfNeeded() {
      try {
        if (localStorage.getItem(KEY_STORAGE_MIGRATION) === '1') return;

        const legacyMap = {
          'demo_censo_pending': KEY_PENDING,
          'demo_reemplazados_all': KEY_REEMPLAZADOS_ALL,
          'demo_reemplazados_pending': KEY_REEMPLAZADOS_PENDING,
          'demo_base_cache_v1': KEY_BASE_CACHE,
          'demo_users_cache_v1': KEY_USERS_CACHE,
          'demo_gh_write_token': KEY_GH_TOKEN,
          'demo_sync_proxy_url': KEY_SYNC_PROXY_URL,
          'demo_device_id': KEY_DEVICE_ID,
          'demo_censo_enviados': KEY_ENVIADOS,
          'demo_sw_migrated_v3': KEY_SW_MIGRATION
        };

        Object.entries(legacyMap).forEach(([legacyKey, newKey]) => {
          const current = localStorage.getItem(newKey);
          if (current !== null) return;
          const legacy = localStorage.getItem(legacyKey);
          if (legacy !== null) {
            localStorage.setItem(newKey, legacy);
          }
        });

        localStorage.setItem(KEY_STORAGE_MIGRATION, '1');
      } catch {
      }
    }

    function firstValue(obj, keys) {
      for (const key of keys) {
        const value = obj[key];
        if (value !== undefined && value !== null && String(value).trim() !== '') {
          return String(value).trim();
        }
      }
      return '';
    }

    function normalizeHeaders(obj) {
      const out = {};
      Object.keys(obj).forEach((k) => {
        out[k.toLowerCase().trim()] = obj[k];
      });
      return out;
    }

    function parseCsvLine(line, delimiter) {
      const cols = [];
      let current = '';
      let inQuotes = false;

      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        const next = line[i + 1];

        if (ch === '"') {
          if (inQuotes && next === '"') {
            current += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (ch === delimiter && !inQuotes) {
          cols.push(current);
          current = '';
        } else {
          current += ch;
        }
      }
      cols.push(current);
      return cols.map((v) => v.trim());
    }

    function csvToRows(text) {
      const lines = text.split(/\r?\n/).filter((l) => l.trim().length > 0);
      if (!lines.length) return [];

      const delimiter = lines[0].includes(';') ? ';' : ',';
      const headers = parseCsvLine(lines[0], delimiter);
      const rows = [];

      for (let i = 1; i < lines.length; i++) {
        const cols = parseCsvLine(lines[i], delimiter);
        const row = {};
        headers.forEach((h, idx) => {
          row[h] = cols[idx] ?? '';
        });
        rows.push(row);
      }
      return rows;
    }

    function rowsToPadron(rows) {
      const nuevoPadron = {};
      rows.forEach((raw) => {
        const key = normalizeHeaders(raw);
        const clave = firstValue(key, ['hogares con jefas', 'clave_vivienda', 'clave vivienda', 'clave']);
        if (!clave) return;

        nuevoPadron[clave] = {
          clave_vivienda: clave,
          nombre: firstValue(key, ['nombre de la jefa', 'nombre', 'jefa de familia']),
          edad: firstValue(key, ['edad']),
          telefono: firstValue(key, ['telefono', 'teléfono']),
          correo_electronico: firstValue(key, ['correo electronico', 'correo electrónico', 'correo', 'email', 'e-mail']),
          calle: firstValue(key, ['calle']),
          numero: firstValue(key, ['numero', 'número']),
          manzana_inegi: firstValue(key, ['manzana inegi', 'manzana_inegi', 'manzana']),
          manzana: firstValue(key, ['manzana direccion', 'manzana_direccion']),
          lote: firstValue(key, ['lote']),
          curp: firstValue(key, ['curp']),
          colonia: firstValue(key, ['colonia']),
          codigo_postal: firstValue(key, ['codigo postal', 'código postal', 'cp', 'codigo_postal']),
          direccion_base: firstValue(key, ['direccion', 'dirección']),
          raw_base: raw
        };
      });
      return nuevoPadron;
    }

    function saveBaseCache(padron, source) {
      localStorage.setItem(KEY_BASE_CACHE, JSON.stringify({
        padron,
        source,
        savedAt: new Date().toISOString()
      }));
    }

    function saveUsersCache(users, source) {
      localStorage.setItem(KEY_USERS_CACHE, JSON.stringify({
        users,
        source,
        savedAt: new Date().toISOString()
      }));
    }

    function loadBaseCache() {
      try {
        const raw = JSON.parse(localStorage.getItem(KEY_BASE_CACHE) || '{}');
        if (!raw || !raw.padron || !Object.keys(raw.padron).length) return null;
        return raw;
      } catch {
        return null;
      }
    }

    function loadUsersCache() {
      try {
        let raw = JSON.parse(localStorage.getItem(KEY_USERS_CACHE) || '{}');
        if (!raw || !Array.isArray(raw.users) || !raw.users.length) {
          raw = JSON.parse(localStorage.getItem('papeao_users_cache_v1') || '{}');
        }
        if (!raw || !Array.isArray(raw.users) || !raw.users.length) return null;
        return raw;
      } catch {
        return null;
      }
    }

    function normalizeName(str) {
      return String(str || '')
        .toLowerCase()
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/\s+/g, '_');
    }

    function githubHeaders(token) {
      const headers = { 'Accept': 'application/vnd.github+json' };
      if (token) headers['Authorization'] = `Bearer ${token}`;
      return headers;
    }

    async function listGithubPath(path, token) {
      const cleanPath = path ? `/${encodeURIComponent(path).replace(/%2F/g, '/')}` : '';
      const url = `https://api.github.com/repos/${BASE_OWNER}/${BASE_REPO}/contents${cleanPath}?ref=${BASE_BRANCH}`;
      const response = await fetch(url, { headers: githubHeaders(token) });
      if (!response.ok) return null;
      const body = await response.json();
      return Array.isArray(body) ? body : [body];
    }

    async function getRepoFiles(token) {
      if (repoFilesCache) return repoFilesCache;

      for (const branch of BRANCH_CANDIDATES) {
        const url = `https://api.github.com/repos/${BASE_OWNER}/${BASE_REPO}/git/trees/${branch}?recursive=1`;
        const response = await fetch(url, { headers: githubHeaders(token) });
        if (!response.ok) continue;

        const body = await response.json();
        const tree = Array.isArray(body.tree) ? body.tree : [];
        const files = tree
          .filter((item) => item.type === 'blob')
          .map((item) => ({
            type: 'file',
            path: item.path,
            name: String(item.path).split('/').pop()
          }));

        if (files.length) {
          repoBranchInUse = branch;
          repoFilesCache = files;
          return repoFilesCache;
        }
      }

      const root = await listGithubPath('', token);
      if (!root) return null;
      repoFilesCache = root.filter((x) => x.type === 'file');
      return repoFilesCache;
    }

    async function loadTextFileFromGithub(path, token) {
      const apiUrl = `https://api.github.com/repos/${BASE_OWNER}/${BASE_REPO}/contents/${encodeURIComponent(path).replace(/%2F/g, '/')}?ref=${repoBranchInUse}`;
      const response = await fetch(apiUrl, { headers: githubHeaders(token) });
      if (!response.ok) {
        throw new Error('No se pudo leer archivo base en GitHub.');
      }
      const body = await response.json();
      return decodeURIComponent(escape(atob((body.content || '').replace(/\n/g, ''))));
    }

    async function loadBinaryFileFromGithub(path, token) {
      const apiUrl = `https://api.github.com/repos/${BASE_OWNER}/${BASE_REPO}/contents/${encodeURIComponent(path).replace(/%2F/g, '/')}?ref=${repoBranchInUse}`;
      const response = await fetch(apiUrl, {
        headers: {
          ...(token ? { 'Authorization': `Bearer ${token}` } : {}),
          'Accept': 'application/vnd.github.raw'
        }
      });
      if (!response.ok) {
        throw new Error('No se pudo leer archivo XLSX en GitHub.');
      }
      return response.arrayBuffer();
    }

    async function loadTextFileFromStatic(path) {
      const response = await fetch(path, { cache: 'no-store' });
      if (!response.ok) {
        throw new Error('No se pudo leer archivo estático.');
      }
      return response.text();
    }

    async function loadBinaryFileFromStatic(path) {
      const response = await fetch(path, { cache: 'no-store' });
      if (!response.ok) {
        throw new Error('No se pudo leer archivo XLSX estático.');
      }
      return response.arrayBuffer();
    }

    async function tryFetchBaseFromStatic() {
      for (const sourcePath of BASE_STATIC_FILE_CANDIDATES) {
        const lowerName = normalizeName(sourcePath);
        try {
          if (lowerName.endsWith('.xlsx')) {
            if (typeof XLSX === 'undefined') {
              throw new Error('Falta la librería XLSX en censo-app/libs/xlsx.full.min.js.');
            }
            const buffer = await loadBinaryFileFromStatic(sourcePath);
            const workbook = XLSX.read(buffer, { type: 'array' });
            const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
            const rows = XLSX.utils.sheet_to_json(firstSheet, { defval: '' });
            const padron = rowsToPadron(rows);
            if (Object.keys(padron).length) return { padron, source: sourcePath };
            continue;
          }

          const content = await loadTextFileFromStatic(sourcePath);
          if (lowerName.endsWith('.json')) {
            const data = JSON.parse(content);
            const rows = Array.isArray(data) ? data : Object.values(data);
            const padron = rowsToPadron(rows);
            if (Object.keys(padron).length) return { padron, source: sourcePath };
            continue;
          }

          if (lowerName.endsWith('.csv')) {
            const rows = csvToRows(content);
            const padron = rowsToPadron(rows);
            if (Object.keys(padron).length) return { padron, source: sourcePath };
          }
        } catch {
        }
      }

      throw new Error('No se encontró base estática local (XLSX/CSV/JSON).');
    }

    async function tryFetchBaseFromGithub() {
      const token = getGithubWriteToken();
      const allFiles = await getRepoFiles(token);
      if (!allFiles) {
        throw new Error('No se pudo leer el repositorio base. Verifica permisos de GitHub.');
      }

      const preferred = [];
      for (const candidate of BASE_FILE_CANDIDATES) {
        preferred.push(normalizeName(candidate.split('/').pop()));
      }

      const fileHit = allFiles.find((file) => {
        const nm = normalizeName(file.name);
        return preferred.includes(nm);
      }) || allFiles.find((file) => {
        const nm = normalizeName(file.name);
        return (nm.includes('total_jefas') && nm.includes('familia') && (nm.endsWith('.csv') || nm.endsWith('.json')));
      });

      if (fileHit) {
        const sourcePath = fileHit.path || fileHit.name;
        const lowerName = normalizeName(fileHit.name);

        if (lowerName.endsWith('.xlsx')) {
          if (typeof XLSX === 'undefined') {
            throw new Error('Falta la librería XLSX en censo-app/libs/xlsx.full.min.js.');
          }
          const buffer = await loadBinaryFileFromGithub(sourcePath, token);
          const workbook = XLSX.read(buffer, { type: 'array' });
          const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
          const rows = XLSX.utils.sheet_to_json(firstSheet, { defval: '' });
          const padron = rowsToPadron(rows);
          if (Object.keys(padron).length) return { padron, source: sourcePath };
        }

        const content = await loadTextFileFromGithub(sourcePath, token);

        if (lowerName.endsWith('.json')) {
          const data = JSON.parse(content);
          const rows = Array.isArray(data) ? data : Object.values(data);
          const padron = rowsToPadron(rows);
          if (Object.keys(padron).length) return { padron, source: sourcePath };
        }

        if (lowerName.endsWith('.csv')) {
          const rows = csvToRows(content);
          const padron = rowsToPadron(rows);
          if (Object.keys(padron).length) return { padron, source: sourcePath };
        }
      }

      throw new Error('No se encontró base por defecto en GitHub (XLSX/CSV/JSON).');
    }

    function rowsToUsers(rows) {
      const users = [];
      rows.forEach((raw) => {
        const key = normalizeHeaders(raw);
        const nombre = firstValue(key, ['nombre', 'usuario', 'capturista', 'nombre_usuario']);
        const telefono = firstValue(key, ['telefono', 'teléfono', 'celular', 'telefono_usuario']);
        const clave = firstValue(key, ['clave', 'clave_acceso', 'password', 'pin']);

        if (!nombre) return;
        users.push({ nombre, telefono, clave });
      });

      const unique = [];
      const seen = new Set();
      for (const user of users) {
        const k = normalizeName(user.nombre);
        if (seen.has(k)) continue;
        seen.add(k);
        unique.push(user);
      }
      return unique;
    }

      const partial = usersCatalog.find((u) => normalizeName(u.nombre).startsWith(normalizeName(nombre)));

    async function tryFetchUsersFromGithub() {
      const token = getGithubWriteToken();
      const allFiles = await getRepoFiles(token);
      if (!allFiles) {
        throw new Error('No se pudo leer repositorio para catálogo de usuarios.');
      }

      const preferred = USERS_FILE_CANDIDATES.map((x) => normalizeName(x.split('/').pop()));
      const fileHit = allFiles.find((file) => preferred.includes(normalizeName(file.name)))
        || allFiles.find((file) => {
          const nm = normalizeName(file.name);
          return (nm.includes('usuario') || nm.includes('capturista')) && (nm.endsWith('.csv') || nm.endsWith('.json'));
        });

      if (!fileHit) {
        const xlsxUsers = allFiles.find((file) => {
          const nm = normalizeName(file.name);
          return nm.includes('usuarios') && nm.endsWith('.xlsx');
        });

        if (xlsxUsers) {
          const sourcePath = xlsxUsers.path || xlsxUsers.name;
          if (typeof XLSX === 'undefined') {
            throw new Error('Falta la librería XLSX en censo-app/libs/xlsx.full.min.js.');
          }
          const buffer = await loadBinaryFileFromGithub(sourcePath, token);
          const workbook = XLSX.read(buffer, { type: 'array' });
          const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
          const rows = XLSX.utils.sheet_to_json(firstSheet, { defval: '' });
          const users = rowsToUsers(rows);
          if (!users.length) {
            throw new Error('USUARIOS.xlsx no trae columnas válidas de nombre/clave.');
          }
          return { users, source: sourcePath };
        }

        throw new Error('No se encontró catálogo de usuarios (XLSX/CSV/JSON).');
      }

      const sourcePath = fileHit.path || fileHit.name;
      const lowerName = normalizeName(fileHit.name);

      if (lowerName.endsWith('.xlsx')) {
        if (typeof XLSX === 'undefined') {
          throw new Error('Falta la librería XLSX en censo-app/libs/xlsx.full.min.js.');
        }
        const buffer = await loadBinaryFileFromGithub(sourcePath, token);
        const workbook = XLSX.read(buffer, { type: 'array' });
        const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(firstSheet, { defval: '' });
        const users = rowsToUsers(rows);
        if (!users.length) {
          throw new Error('USUARIOS.xlsx no trae columnas válidas de nombre/clave.');
        }
        return { users, source: sourcePath };
      }

      const content = await loadTextFileFromGithub(sourcePath, token);

      let rows = [];
      if (lowerName.endsWith('.json')) {
        const data = JSON.parse(content);
        rows = Array.isArray(data) ? data : Object.values(data);
      } else {
        rows = csvToRows(content);
      }

      const users = rowsToUsers(rows);
      if (!users.length) {
        throw new Error('Catálogo encontrado pero sin columnas de nombre/teléfono válidas.');
      }

      return { users, source: sourcePath };
    }

    async function tryFetchUsersFromStatic() {
      for (const sourcePath of USERS_STATIC_FILE_CANDIDATES) {
        const lowerName = normalizeName(sourcePath);
        try {
          if (lowerName.endsWith('.xlsx')) {
            if (typeof XLSX === 'undefined') {
              throw new Error('Falta la librería XLSX en censo-app/libs/xlsx.full.min.js.');
            }
            const buffer = await loadBinaryFileFromStatic(sourcePath);
            const workbook = XLSX.read(buffer, { type: 'array' });
            const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
            const rows = XLSX.utils.sheet_to_json(firstSheet, { defval: '' });
            const users = rowsToUsers(rows);
            if (users.length) return { users, source: sourcePath };
            continue;
          }

          const content = await loadTextFileFromStatic(sourcePath);
          let rows = [];
          if (lowerName.endsWith('.json')) {
            const data = JSON.parse(content);
            rows = Array.isArray(data) ? data : Object.values(data);
          } else if (lowerName.endsWith('.csv')) {
            rows = csvToRows(content);
          }

          const users = rowsToUsers(rows);
          if (users.length) return { users, source: sourcePath };
        } catch {
        }
      }

      throw new Error('No se encontró catálogo estático de usuarios (XLSX/CSV/JSON).');
    }

        usersCatalog = remote.users;
        saveUsersCache(usersCatalog, remote.source);

    function obtenerCoordenadasGps(options) {

      });

    async function capturarCoordenadasGPS() {
      if (!window.isSecureContext) {
        estado('La captura GPS requiere abrir la app en HTTPS.', false);
        return;
      }
      if (!navigator.geolocation) {
        estado('Tu navegador no soporta geolocalización GPS.', false);
        return;
      }

      const button = document.getElementById('btnCapturarGPS');
      const originalText = button ? button.textContent : '';
      if (button) {
        button.disabled = true;
        button.textContent = 'Capturando...';
      }

      estado('Capturando coordenadas GPS...');

      try {
        let position;
        try {
          position = await obtenerCoordenadasGps({
            enableHighAccuracy: true,
            timeout: 20000,
            maximumAge: 0
          });
        } catch {
          position = await obtenerCoordenadasGps({
            enableHighAccuracy: false,
            timeout: 15000,
            maximumAge: 60000
          });
        }

        const lat = Number(position.coords.latitude).toFixed(6);
        const lng = Number(position.coords.longitude).toFixed(6);
        const coords = `${lat},${lng}`;
        setValor('coordenadas_gps', coords);
        estado(`Coordenadas capturadas: ${coords}`);
      } catch (error) {
        const code = Number(error?.code || 0);
        if (code === 1) {
          estado('Permiso de ubicación denegado. Activa la ubicación y permite el acceso al sitio.', false);
        } else if (code === 2) {
          estado('No se pudo obtener ubicación del dispositivo. Verifica señal GPS y vuelve a intentar.', false);
        } else if (code === 3) {
          estado('Tiempo de espera agotado al obtener GPS. Intenta nuevamente en un lugar abierto.', false);
        } else {
          estado('No se pudo capturar GPS: ' + String(error?.message || 'Error desconocido'), false);
        }
      } finally {
        if (button) {
          button.disabled = false;
          button.textContent = originalText || 'Capturar coordenadas GPS';
        }
      }
    }

    function readFileAsDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ''));
        reader.onerror = () => reject(new Error('No se pudo leer la imagen.'));
        reader.readAsDataURL(file);
      });
    }

    function loadImage(dataUrl) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = () => reject(new Error('No se pudo procesar la imagen.'));
        img.src = dataUrl;
      });
    }

    async function comprimirFotoCredencial(file) {
      const dataUrl = await readFileAsDataUrl(file);
      const image = await loadImage(dataUrl);

      const scale = Math.min(PHOTO_MAX_WIDTH / image.width, PHOTO_MAX_HEIGHT / image.height, 1);
      const targetWidth = Math.max(1, Math.round(image.width * scale));
      const targetHeight = Math.max(1, Math.round(image.height * scale));

      const canvas = document.createElement('canvas');
      canvas.width = targetWidth;
      canvas.height = targetHeight;

      const ctx = canvas.getContext('2d');
      ctx.drawImage(image, 0, 0, targetWidth, targetHeight);

      const outDataUrl = canvas.toDataURL('image/jpeg', PHOTO_JPEG_QUALITY);
      const approxBytes = Math.round((outDataUrl.length * 3) / 4);
      const approxKb = Math.round(approxBytes / 1024);

      return {
        dataUrl: outDataUrl,
        width: targetWidth,
        height: targetHeight,
        sizeKb: approxKb
      };
    }

    function actualizarVistaFoto(slot) {
      const previewMap = { 1: 'foto1_preview', 2: 'foto2_preview', 3: 'foto3_preview' };
      const metaMap = { 1: 'foto1_meta', 2: 'foto2_meta', 3: 'foto3_meta' };
      const preview = document.getElementById(previewMap[slot] || 'foto1_preview');
      const meta = document.getElementById(metaMap[slot] || 'foto1_meta');
      const foto = fotosCredencial[slot];

      if (!foto) {

        if (meta) meta.textContent = 'Sin captura';

      if (preview) preview.src = foto.dataUrl;
      if (meta) meta.textContent = `Capturada (${foto.width}x${foto.height}, ~${foto.sizeKb} KB)`;
    }

    function fotoKey(localId, slot) {
      return `${String(localId || '').trim()}_${slot}`;
    }

    async function openPhotosDb() {
      if (!window.indexedDB) {
        throw new Error('Este navegador no soporta almacenamiento local de fotos (IndexedDB).');
      }
      if (photosDbPromise) return photosDbPromise;

      photosDbPromise = new Promise((resolve, reject) => {
        const request = indexedDB.open(PHOTO_DB_NAME, 1);

        request.onupgradeneeded = () => {
          const db = request.result;
          if (!db.objectStoreNames.contains(PHOTO_DB_STORE)) {
            const store = db.createObjectStore(PHOTO_DB_STORE, { keyPath: 'key' });
            store.createIndex('local_id', 'local_id', { unique: false });
          }
        };

        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error || new Error('No se pudo abrir base local de fotos.'));
      });

      return photosDbPromise;
    }

    async function guardarFotoOffline({ localId, slot, filePath, dataUrl, sizeKb }) {
      const db = await openPhotosDb();
      await new Promise((resolve, reject) => {
        const tx = db.transaction(PHOTO_DB_STORE, 'readwrite');
        const store = tx.objectStore(PHOTO_DB_STORE);
        store.put({
          key: fotoKey(localId, slot),
          local_id: String(localId || ''),
          slot,
          file_path: String(filePath || ''),
          data_url: String(dataUrl || ''),
          size_kb: Number(sizeKb || 0),
          saved_at: new Date().toISOString()
        });
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error || new Error('No se pudo guardar foto offline.'));
      });
    }

    async function obtenerFotoOffline(localId, slot) {
      const db = await openPhotosDb();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(PHOTO_DB_STORE, 'readonly');
        const store = tx.objectStore(PHOTO_DB_STORE);
        const request = store.get(fotoKey(localId, slot));
        request.onsuccess = () => resolve(request.result || null);
        request.onerror = () => reject(request.error || new Error('No se pudo leer foto offline.'));
      });
    }

    async function eliminarFotoOffline(localId, slot) {
      const db = await openPhotosDb();
      await new Promise((resolve, reject) => {
        const tx = db.transaction(PHOTO_DB_STORE, 'readwrite');
        const store = tx.objectStore(PHOTO_DB_STORE);
        store.delete(fotoKey(localId, slot));
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error || new Error('No se pudo eliminar foto offline.'));
      });
    }

    async function guardarFotosDelRegistroOffline(localId, item) {
      for (const slot of PHOTO_SLOTS) {
        await guardarFotoOffline({
          localId,
          slot,
          filePath: item[`foto_${slot}_path`],
          dataUrl: fotosCredencial[slot]?.dataUrl,
          sizeKb: fotosCredencial[slot]?.sizeKb
        });
      }
    }

    async function eliminarFotosDeRegistros(items) {
      for (const item of items) {
        const localId = item?.local_id;
        if (!localId) continue;
        for (const slot of PHOTO_SLOTS) {
          await eliminarFotoOffline(localId, slot);
        }
      }
    }

    async function procesarFotoCredencial(slot, event) {
      try {
        const file = event?.target?.files?.[0];
        if (!file) return;
        estado(`Procesando foto ${slot}...`);
        const fotoComprimida = await comprimirFotoCredencial(file);
        fotosCredencial[slot] = fotoComprimida;
        actualizarVistaFoto(slot);
        estado(`Foto ${slot} capturada en baja calidad (~${fotoComprimida.sizeKb} KB).`);
      } catch (error) {

    async function guardarOffline() {
      if (!ensureAuthenticated()) return;
      const clave = valor('clave_vivienda');
      if (!clave) return estado('La clave vivienda es obligatoria.', false);
      const curp = valor('curp');
      if (!curp) return estado('El CURP es obligatorio para nombrar las fotos.', false);
      const coordenadasGps = valor('coordenadas_gps');
      if (!coordenadasGps) return estado('Debes capturar coordenadas GPS antes de guardar.', false);
      if (PHOTO_SLOTS.some((slot) => !fotosCredencial[slot])) return estado('Debes capturar Frontal, Reverso y Comprobante de Domicilio antes de guardar.', false);

      const items = getPending();
      const existingIndex = items.findIndex((row) => String(row.clave_vivienda || '').trim() === clave.trim());
      const previousLocalId = existingIndex >= 0 ? items[existingIndex].local_id : null;
      const recordLocalId = previousLocalId || (Date.now() + '-' + Math.random().toString(36).slice(2,7));

      const item = {
        local_id: recordLocalId,
        capturista_nombre: sessionUser.nombre,
        capturista_telefono: sessionUser.telefono,
        clave_vivienda: clave,
        nombre: valor('nombre'),
        edad: valor('edad') ? Number(valor('edad')) : null,
        telefono: valor('telefono'),
        correo_electronico: valor('correo_electronico'),
        foto_1_path: construirRutaFoto(curp, 1),
        foto_2_path: construirRutaFoto(curp, 2),
        foto_3_path: construirRutaFoto(curp, 3),
        foto_1_kb: fotosCredencial[1]?.sizeKb || '',
        foto_2_kb: fotosCredencial[2]?.sizeKb || '',
        foto_3_kb: fotosCredencial[3]?.sizeKb || '',
        calle: valor('calle'),
        numero: valor('numero'),
        manzana_inegi: valor('manzana_inegi'),
        manzana: valor('manzana'),
        lote: valor('lote'),
        curp,
        colonia: valor('colonia'),
        codigo_postal: valor('codigo_postal'),
        coordenadas_gps: coordenadasGps,
        direccion_base: valor('direccion_base'),
        fecha_captura: new Date().toISOString()
      };

      try {
        await guardarFotosDelRegistroOffline(recordLocalId, item);
      } catch (error) {
        estado('No se pudieron guardar las fotos offline: ' + String(error?.message || 'Error desconocido'), false);
        return;
      }

      if (existingIndex >= 0) {
        appendReemplazado(items[existingIndex], item);
        items[existingIndex] = item;
      } else {
        items.push(item);
      }

      setPending(items);
      limpiarFotosCredencial();
      estado(existingIndex >= 0
        ? `Registro reemplazado para la clave vivienda ${clave}.`
        : 'Registro guardado offline en este navegador.');
    }

    function csvEscape(value) {
      const str = String(value ?? '');
      if (str.includes(',') || str.includes('"') || str.includes('\n')) {
        return '"' + str.replaceAll('"', '""') + '"';
      }
      return str;
    }

    function itemsToCsv(items) {
      const headers = ['local_id','capturista_nombre','capturista_telefono','clave_vivienda','nombre','edad','telefono','correo_electronico','foto_1_path','foto_2_path','foto_3_path','foto_1_kb','foto_2_kb','foto_3_kb','calle','numero','manzana_inegi','manzana','lote','curp','colonia','codigo_postal','coordenadas_gps','direccion_base','fecha_captura'];
      const lines = [headers.join(',')];
      items.forEach((item) => {
        const line = headers.map((h) => csvEscape(item[h])).join(',');
        lines.push(line);
      });
      return lines.join('\n');
    }

    function reemplazadosToCsv(items) {
      const headers = [
        'reemplazo_id','fecha_reemplazo','clave_vivienda','capturista_reemplazo',
        'local_id_anterior','local_id_actual',
        'nombre_anterior','edad_anterior','telefono_anterior','correo_electronico_anterior','foto_1_path_anterior','foto_2_path_anterior','foto_3_path_anterior','calle_anterior','numero_anterior','manzana_inegi_anterior','manzana_anterior','lote_anterior','curp_anterior','colonia_anterior','codigo_postal_anterior','coordenadas_gps_anterior','direccion_base_anterior',
        'nombre_nuevo','edad_nueva','telefono_nuevo','correo_electronico_nuevo','foto_1_path_nuevo','foto_2_path_nuevo','foto_3_path_nuevo','calle_nueva','numero_nuevo','manzana_inegi_nueva','manzana_nueva','lote_nuevo','curp_nuevo','colonia_nueva','codigo_postal_nueva','coordenadas_gps_nueva','direccion_base_nueva'
      ];
      const lines = [headers.join(',')];
      items.forEach((item) => {
        lines.push(headers.map((h) => csvEscape(item[h])).join(','));
      });
      return lines.join('\n');
    }

    function contarFilasDatosCsv(csv) {
      const rows = String(csv || '').replace(/\r/g, '').split('\n').filter((line) => line.length > 0);
      return rows.length > 0 ? rows.length - 1 : 0;
    }

    function validarIntegridadCsv(csv, expectedRows, label) {
      const generatedRows = contarFilasDatosCsv(csv);
      if (generatedRows !== expectedRows) {
        throw new Error(`Integridad CSV falló (${label}): esperadas ${expectedRows} filas y se generaron ${generatedRows}.`);
      }
    }

    function validarColeccionRegistros(items, label) {
      if (!Array.isArray(items)) {
        throw new Error(`Integridad de datos falló (${label}): colección inválida.`);
      }
      const ids = new Set();
      items.forEach((row, idx) => {
        if (!row || !String(row.clave_vivienda || '').trim()) {
          throw new Error(`Integridad de datos falló (${label}): clave vivienda vacía en fila ${idx + 1}.`);
        }
        const localId = String(row.local_id || '').trim();
        if (localId) {
          if (ids.has(localId)) {
            throw new Error(`Integridad de datos falló (${label}): local_id duplicado (${localId}).`);
          }
          ids.add(localId);
        }
        const coords = String(row.coordenadas_gps || row.coordenadas_gps_nueva || '').trim();
        if (!coords) {
          throw new Error(`Integridad de datos falló (${label}): coordenadas GPS vacías en fila ${idx + 1}.`);
        }
      });
    }

    async function getGithubFileSha({ owner, repo, branch, filePath, token }) {
      const encodedFilePath = encodeURIComponent(filePath).replace(/%2F/g, '/');
      const response = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${encodedFilePath}?ref=${branch}`, {
        headers: {
          'Authorization': `Bearer ${token}`,
          'Accept': 'application/vnd.github+json'
        }
      });

      if (response.status === 404) return '';
      if (!response.ok) {
        const err = await response.json().catch(() => ({}));
        throw new Error(err.message || `Error HTTP ${response.status}`);
      }

      const body = await response.json().catch(() => ({}));
      return String(body.sha || '').trim();
    }

    async function uploadBase64FileToGithub({ owner, repo, branch, filePath, contentB64, token, commitMessage }) {
      const encodedFilePath = encodeURIComponent(filePath).replace(/%2F/g, '/');
      const sha = await getGithubFileSha({ owner, repo, branch, filePath, token });
      const body = {
        message: commitMessage,
        content: contentB64,
        branch
      };
      if (sha) body.sha = sha;

      const response = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${encodedFilePath}`, {
        method: 'PUT',
        headers: {
          'Authorization': `Bearer ${token}`,
          'Accept': 'application/vnd.github+json',
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(body)
      });

      if (!response.ok) {
        const err = await response.json().catch(() => ({}));
        if (String(err.message || '').toLowerCase().includes('bad credentials')) {
          throw new Error('Token inválido o vencido. Configura un token nuevo en Configuración técnica.');
        }
        throw new Error(err.message || `Error HTTP ${response.status}`);
      }
    }

    function dataUrlToBase64(dataUrl) {
      const raw = String(dataUrl || '');
      const idx = raw.indexOf(',');
      if (idx < 0) {
        throw new Error('Foto inválida para sincronización.');
      }
      return raw.slice(idx + 1);
    }

    async function uploadCsvFileToGithub({ owner, repo, branch, filePath, csv, token, commitMessage }) {
      const contentB64 = btoa(unescape(encodeURIComponent(csv)));
      await uploadBase64FileToGithub({ owner, repo, branch, filePath, contentB64, token, commitMessage });
    }

    async function uploadFotoFileToGithub({ owner, repo, branch, filePath, dataUrl, token, commitMessage }) {
      const contentB64 = dataUrlToBase64(dataUrl);
      await uploadBase64FileToGithub({ owner, repo, branch, filePath, contentB64, token, commitMessage });
    }

    async function subirFotosPendientesGithub({ owner, repo, branch, token, items }) {
      for (const item of items) {
        const localId = String(item?.local_id || '').trim();
        const clave = String(item?.clave_vivienda || localId);
        if (!localId) {
          throw new Error('Registro sin local_id al subir fotos.');
        }

        for (const slot of PHOTO_SLOTS) {
          const filePath = String(item[`foto_${slot}_path`] || '').trim();
          if (!filePath) {
            throw new Error(`Falta ruta de foto ${slot} en registro ${clave}.`);
          }
          const photo = await obtenerFotoOffline(localId, slot);
          if (!photo || !photo.data_url) {
            throw new Error(`Falta foto ${slot} guardada offline para ${clave}.`);
          }

          await uploadFotoFileToGithub({
            owner,
            repo,
            branch,
            filePath,
            dataUrl: photo.data_url,
            token,
            commitMessage: `Foto documento ${slot} ${localId}`
          });
        }
      }
    }

    function applySetupFromUrl() {
      try {
        const url = new URL(window.location.href);
        const queryToken = url.searchParams.get('setup_token');
        const queryProxy = url.searchParams.get('setup_proxy');
        const hashParams = new URLSearchParams((url.hash || '').replace(/^#/, ''));
        const hashToken = hashParams.get('setup_token');
        const hashProxy = hashParams.get('setup_proxy');
        const setupToken = String(queryToken || hashToken || '').trim();
        const setupProxy = String(queryProxy || hashProxy || '').trim();

        if (setupToken) {
          localStorage.setItem(KEY_GH_TOKEN, setupToken);
          estado('Token configurado automáticamente desde enlace.');

          url.searchParams.delete('setup_token');
          hashParams.delete('setup_token');
          url.hash = hashParams.toString() ? `#${hashParams.toString()}` : '';
          window.history.replaceState({}, document.title, url.toString());
        }

        if (setupProxy) {
          localStorage.setItem(KEY_SYNC_PROXY_URL, setupProxy);
          estado('URL central configurada automáticamente desde enlace.');

          url.searchParams.delete('setup_proxy');
          hashParams.delete('setup_proxy');
          url.hash = hashParams.toString() ? `#${hashParams.toString()}` : '';
          window.history.replaceState({}, document.title, url.toString());
        }

        const clearToken = url.searchParams.get('clear_token') === '1' || hashParams.get('clear_token') === '1';
        if (clearToken) {
          localStorage.removeItem(KEY_GH_TOKEN);
          estado('Token eliminado por enlace de limpieza.');
          url.searchParams.delete('clear_token');
          hashParams.delete('clear_token');
          url.hash = hashParams.toString() ? `#${hashParams.toString()}` : '';
          window.history.replaceState({}, document.title, url.toString());
        }

        const clearProxy = url.searchParams.get('clear_proxy') === '1' || hashParams.get('clear_proxy') === '1';
        if (clearProxy) {
          localStorage.removeItem(KEY_SYNC_PROXY_URL);
          estado('URL central eliminada por enlace de limpieza.');
          url.searchParams.delete('clear_proxy');
          hashParams.delete('clear_proxy');
          url.hash = hashParams.toString() ? `#${hashParams.toString()}` : '';
          window.history.replaceState({}, document.title, url.toString());
        }
      } catch {
      }
    }

    function tokenFromScannedText(text) {
      const raw = String(text || '').trim();
      if (!raw) return '';
      if (raw.startsWith('github_pat_') || raw.startsWith('ghp_')) return raw;

      try {
        const url = new URL(raw);
        const fromQuery = url.searchParams.get('setup_token');
        const hashParams = new URLSearchParams((url.hash || '').replace(/^#/, ''));
        const fromHash = hashParams.get('setup_token');
        return String(fromQuery || fromHash || '').trim();
      } catch {
        return '';
      }
    }

    function guardarTokenDesdeTexto(tokenText) {
      const token = tokenFromScannedText(tokenText);
      if (!token) {
        estado('El valor no contiene un token válido.', false);
        return false;
      }

      const input = document.getElementById('gh_token_input');
      if (input) input.value = token;
      if (!saveTokenLocal(token)) {
        estado('No se pudo guardar token en este navegador.', false);
        return false;
      }

      refreshTokenStatus();
      estado('Token guardado correctamente.');
      return true;
    }

    async function enviarGithubCSV(allowDownloadFallback = true) {
      const items = getPending();
      if (!items.length) return estado('No hay pendientes para enviar a GitHub.', false);

      const owner = BASE_OWNER;
      const repo = BASE_REPO;
      const branch = repoBranchInUse;
      const folder = getValue('ghFolder') || 'Bases de datos';
      const token = getGithubWriteToken();

      if (!owner || !repo) {
        return estado('Falta configuración de repositorio.', false);
      }

      if (!token) {
        if (allowDownloadFallback) {
          const fileName = descargarPendientesCSV(items);
          return estado(`Falta token GitHub. Se descargó ${fileName}; o configura el token GitHub para sincronizar manualmente.`, false);
        }
        return estado('Falta token GitHub para sincronización manual.', false);
      }

      try {
        validarColeccionRegistros(items, 'pendientes');
        const stamp = new Date().toISOString().replace(/[:.]/g, '-');
        const deviceId = getDeviceId();
        const capturista = normalizeName(items[0]?.capturista_nombre || 'sin_capturista');

        estado('Subiendo fotos de documentos a GitHub...');
        await subirFotosPendientesGithub({ owner, repo, branch, token, items });

        estado('Subiendo CSV principal...');
        const csv = itemsToCsv(items);
        validarIntegridadCsv(csv, items.length, 'pendientes');
        const filePath = `${folder}/${capturista}/${deviceId}/${stamp}.csv`;

        await uploadCsvFileToGithub({
          owner,
          repo,
          branch,
          filePath,
          csv,
          token,
          commitMessage: `Carga de censo ${deviceId} ${stamp}`
        });

        const reemplazadosPend = getReemplazadosPending();
        if (reemplazadosPend.length) {
          estado('Subiendo CSV de remplazados...');
          validarColeccionRegistros(reemplazadosPend, 'remplazados');
          const csvReemplazados = reemplazadosToCsv(reemplazadosPend);
          validarIntegridadCsv(csvReemplazados, reemplazadosPend.length, 'remplazados');
          const filePathReemplazados = `${folder}/Remplazados/${capturista}/${deviceId}/${stamp}_remplazados.csv`;

          await uploadCsvFileToGithub({
            owner,
            repo,
            branch,
            filePath: filePathReemplazados,
            csv: csvReemplazados,
            token,
            commitMessage: `Carga de remplazados ${deviceId} ${stamp}`
          });

          setReemplazadosPending([]);
        }

        await eliminarFotosDeRegistros(items);
        localStorage.setItem(KEY_ENVIADOS, JSON.stringify([...(JSON.parse(localStorage.getItem(KEY_ENVIADOS)||'[]')), ...items]));
        setPending([]);
        estado(`Envío correcto a GitHub: ${filePath}`);
      } catch (error) {
        estado('Error al enviar a GitHub: ' + error.message, false);
      }
    }

    async function enviarProxyCSV() {
      const items = getPending();
      if (!items.length) return estado('No hay pendientes para enviar.', false);

      const proxyUrl = getSyncProxyUrl();
      if (!proxyUrl) {
        return estado('Falta URL sincronización central.', false);
      }

      const owner = BASE_OWNER;
      const repo = BASE_REPO;
      const branch = repoBranchInUse;
      const folder = getValue('ghFolder') || 'Bases de datos';

      try {
        validarColeccionRegistros(items, 'pendientes');
        const deviceId = localStorage.getItem(KEY_DEVICE_ID) || ('device-' + Math.random().toString(36).slice(2, 8));
        localStorage.setItem(KEY_DEVICE_ID, deviceId);

        const mainPayload = {
          owner,
          repo,
          branch,
          folder,
          type: 'main',
          deviceId,
          items: items.map((item) => ({ ...item, dispositivo_id: deviceId }))
        };

        const mainRes = await fetch(proxyUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(mainPayload)
        });

        const mainBody = await mainRes.json().catch(() => ({}));
        if (!mainRes.ok || !mainBody.ok) {
          throw new Error(mainBody.message || `Proxy error ${mainRes.status}`);
        }

        const reemplazadosPend = getReemplazadosPending();
        if (reemplazadosPend.length) {
          const remPayload = {
            owner,
            repo,
            branch,
            folder: `${folder}/Remplazados`,
            type: 'reemplazados',
            deviceId,
            items: reemplazadosPend.map((item) => ({ ...item, dispositivo_id: deviceId }))
          };

          const remRes = await fetch(proxyUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(remPayload)
          });

          const remBody = await remRes.json().catch(() => ({}));
          if (!remRes.ok || !remBody.ok) {
            throw new Error(remBody.message || `Proxy remplazados error ${remRes.status}`);
          }

          setReemplazadosPending([]);
        }

        localStorage.setItem(KEY_ENVIADOS, JSON.stringify([...(JSON.parse(localStorage.getItem(KEY_ENVIADOS) || '[]')), ...items]));
        setPending([]);
        estado('Envío correcto a sincronización central.');
      } catch (error) {
        estado('Error en sincronización central: ' + error.message, false);
      }
    }

    function redDisponibleSoloWifi() {
      if (!navigator.onLine) {
        return { ok: false, motivo: 'Sin internet/WiFi.' };
      }
      return { ok: true, motivo: '' };
    }

    async function sincronizarManual() {
      if (!ensureAuthenticated(true)) return;
      const red = redDisponibleSoloWifi();
      if (!red.ok) {
        estado(red.motivo, false);
        return;
      }

      const items = getPending();
      if (!items.length) {
        estado('No hay registros pendientes por enviar.');
        return;
      }

      const token = getGithubWriteToken();
      if (!token) {
        const fileName = descargarPendientesCSV(items);
        estado(`No hay token configurado. Descargué ${fileName} para subirlo manual a GitHub.`, false);
        return;
      }

      estado('Enviando registros a GitHub...');
      await enviarGithubCSV(true);
    }

    function descargarCSV() {
      const pendientes = getPending().map((item) => ({ ...item, estado_sync: 'PENDIENTE' }));
      const enviados = JSON.parse(localStorage.getItem(KEY_ENVIADOS) || '[]')
        .map((item) => ({ ...item, estado_sync: 'ENVIADO' }));
      const reemplazados = getReemplazadosAll().map((item) => ({
        ...item,
        estado_sync: 'REMPLAZADO',
        local_id: item.local_id_actual,
        capturista_nombre: item.capturista_reemplazo,
        capturista_telefono: '',
        clave_vivienda: item.clave_vivienda,
        nombre: item.nombre_nuevo,
        edad: item.edad_nueva,
        telefono: item.telefono_nuevo,
        correo_electronico: item.correo_electronico_nuevo,
        foto_1_path: item.foto_1_path_nuevo,
        foto_2_path: item.foto_2_path_nuevo,
        foto_3_path: item.foto_3_path_nuevo,
        calle: item.calle_nueva,
        numero: item.numero_nuevo,
        manzana_inegi: item.manzana_inegi_nueva,
        manzana: item.manzana_nueva,
        lote: item.lote_nuevo,
        curp: item.curp_nuevo,
        colonia: item.colonia_nueva,
        codigo_postal: item.codigo_postal_nueva,
        coordenadas_gps: item.coordenadas_gps_nueva,
        direccion_base: item.direccion_base_nueva,
        fecha_captura: item.fecha_reemplazo
      }));
      const source = [...pendientes, ...enviados, ...reemplazados];

      if (!source.length) {
        estado('No hay datos para exportar en CSV.', false);
        return;
      }

      const headers = [
        'estado_sync','local_id','capturista_nombre','capturista_telefono','clave_vivienda','nombre','edad','telefono','correo_electronico','foto_1_path','foto_2_path','foto_3_path',
        'calle','numero','manzana_inegi','manzana','lote','curp','colonia','codigo_postal','coordenadas_gps','direccion_base','fecha_captura'
      ];

      const lines = [headers.join(',')];
      source.forEach((item) => {
        lines.push(headers.map((h) => csvEscape(item[h])).join(','));
      });

      const csv = lines.join('\n');
      validarIntegridadCsv(csv, source.length, 'exportación local');
      const stamp = new Date().toISOString().replace(/[:.]/g, '-');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `censo_export_${stamp}.csv`;
      a.click();
      URL.revokeObjectURL(url);
    }

    function descargarPendientesCSV(items = null) {
      const source = Array.isArray(items) ? items : getPending();
      const csv = itemsToCsv(source);
      const capturista = normalizeName(source[0]?.capturista_nombre || 'sin_capturista');
      const stamp = new Date().toISOString().replace(/[:.]/g, '-');
      const fileName = `bases_de_datos_${capturista}_${stamp}.csv`;
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = fileName;
      a.click();
      URL.revokeObjectURL(url);
      return fileName;
    }

    function pintar() {
      const items = getPending();
      document.getElementById('pendingCounter').textContent = `Pendientes por enviar: ${items.length}`;
      const tb = document.getElementById('tablaPendientes');
      tb.innerHTML = items.map(i => `
        <tr>
          <td>${i.clave_vivienda || ''}</td>
          <td>${i.nombre || ''}</td>
          <td>${i.edad ?? ''}</td>
          <td>${i.manzana || ''}</td>
          <td>${new Date(i.fecha_captura).toLocaleString()}</td>
        </tr>
      `).join('');
    }

    migrateLegacyStorageIfNeeded();
    clearSyncProxyUrl();
    PHOTO_SLOTS.forEach((slot) => actualizarVistaFoto(slot));
    applySetupFromUrl();
    pintar();
    refreshTokenStatus();
    cargarBaseAutomatica();
    cargarUsuariosAutomatica();

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', async () => {
        try {
          if (!localStorage.getItem(KEY_SW_MIGRATION)) {
            const keys = await caches.keys();
            const oldKeys = keys.filter((key) => key.startsWith('papeao-censo-'));
            await Promise.all(oldKeys.map((key) => caches.delete(key)));
            localStorage.setItem(KEY_SW_MIGRATION, '1');
          }

          let reloadedByController = false;
          navigator.serviceWorker.addEventListener('controllerchange', () => {
            if (reloadedByController) return;
            reloadedByController = true;
            window.location.reload();
          });

          const registration = await navigator.serviceWorker.register('./sw.js');
          await registration.update().catch(() => {});

          if (registration.waiting) {
            registration.waiting.postMessage({ type: 'SKIP_WAITING' });
          }

          registration.addEventListener('updatefound', () => {
            const installing = registration.installing;
            if (!installing) return;
            installing.addEventListener('statechange', () => {
              if (installing.state === 'installed' && navigator.serviceWorker.controller) {
                installing.postMessage({ type: 'SKIP_WAITING' });
              }
            });
          });
        } catch {
        }
      });
    }
  </script>
</body>
