version: '3.8'
services:
  postgres:
    image: postgres:16
    container_name: censo_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: censo_db
    ports:
      - "5432:5432"
    volumes:
      - censo_pg_data:/var/lib/postgresql/data

volumes:
  censo_pg_data:
